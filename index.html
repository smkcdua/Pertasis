<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertasis - Corduba</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <svg class="icon-sport" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                    <path d="M2 8h16v8H2V8z"></path>
                    <path d="M6 12h4"></path>
                </svg>
                <span>Pertasis <strong>Corduba</strong></span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active">Catat Latihan</a>
                <a href="resume.html">Resume Realtime</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container">
        <div class="grid-layout">
            <!-- Left Side: Configuration Form -->
            <div class="form-group">
                <label>Pilih Kelas</label>
                <select id="selectKelas" required>
                    <option value="">-- Memuat Data Kelas... --</option>
                </select>
            </div>
            
            <div class="form-group-inline">
                <div class="form-group">
                    <label>Jenis Aktivitas</label>
                    <input type="text" id="jenisAktivitas" placeholder="Contoh: Lari 100m" required>
                </div>
                <div class="form-group">
                    <label>Minggu Ke-</label>
                    <input type="number" id="mingguKe" required>
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <select id="semester" required>
                        <option value="1">Ganjil</option>
                        <option value="2">Genap</option>
                    </select>
                </div>
            </div>

            <div class="stopwatch-container">
                <div id="stopwatchDisplay" class="time-display">00:00:00</div>
                <div class="stopwatch-controls">
                    <button id="btnStart" class="btn-start">Mulai</button>
                    <button id="btnStop" class="btn-stop">Stop</button>
                    <button id="btnReset" class="btn-reset">Reset</button>
                </div>
            </div>

            <div id="pencatatanContainer" style="display: none;">
                <h3 style="margin-top: 20px; border-bottom: 2px solid #3498db; padding-bottom: 5px;">Daftar Siswa</h3>
                <ul id="listSiswaPencatatan" class="student-list">
                    </ul>
                
                <button id="btnKirimKolektif" class="btn-kirim-kolektif">Kirim Semua Catatan Waktu</button>
            </div>

                    <!-- Pilihan Aktivitas -->
                    <div class="form-group">
                        <label>Jenis Aktivitas</label>
                        <div class="radio-tile-group">
                            <label class="radio-tile">
                                <input type="radio" name="aktivitas" value="Lari" checked>
                                <div class="tile-content">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                    <span>Lari (Stopwatch)</span>
                                </div>
                            </label>
                            
                            <label class="radio-tile">
                                <input type="radio" name="aktivitas" value="Push Up">
                                <div class="tile-content">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M18 15h-2v2h2v-2zM8 15H6v2h2v-2zM13 11h-2v4h2v-4zM2 20h20"></path>
                                    </svg>
                                    <span>Push Up (Counter)</span>
                                </div>
                            </label>

                            <label class="radio-tile">
                                <input type="radio" name="aktivitas" value="Sit Up">
                                <div class="tile-content">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="9" cy="7" r="4"></circle>
                                    </svg>
                                    <span>Sit Up (Counter)</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Periode Dropdowns -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="select-minggu">Minggu Ke</label>
                            <select id="select-minggu" required>
                                <option value="Minggu 1">Minggu 1</option>
                                <option value="Minggu 2">Minggu 2</option>
                                <option value="Minggu 3">Minggu 3</option>
                                <option value="Minggu 4">Minggu 4</option>
                                <option value="Minggu 5">Minggu 5</option>
                                <option value="Minggu 6">Minggu 6</option>
                                <option value="Minggu 7">Minggu 7</option>
                                <option value="Minggu 8">Minggu 8</option>
                                <option value="Minggu 9">Minggu 9</option>
                                <option value="Minggu 10">Minggu 10</option>
                                <option value="Minggu 11">Minggu 11</option>
                                <option value="Minggu 12">Minggu 12</option>
                                <option value="Minggu 13">Minggu 13</option>
                                <option value="Minggu 14">Minggu 14</option>
                                <option value="Minggu 15">Minggu 15</option>
                                <option value="Minggu 16">Minggu 16</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="select-semester">Semester</label>
                            <select id="select-semester" required>
                                <option value="Ganjil">Ganjil</option>
                                <option value="Genap">Genap</option>
                            </select>
                        </div>
                    </div>

                    <!-- Box Hasil Rekaman yang Siap Dikirim -->
                    <div class="recorded-box">
                        <div class="recorded-label">Hasil yang akan disimpan:</div>
                        <div class="recorded-value" id="final-result-display">00:00.00</div>
                        <input type="hidden" id="final-result-input" required>
                    </div>

                    <!-- Tombol Submit -->
                    <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
                        <span id="submit-text">Kirim ke Google Sheets</span>
                        <div class="spinner hidden" id="submit-spinner"></div>
                    </button>
                    <div class="status-message" id="status-msg"></div>
                </form>
            </section>

            <!-- Right Side: Stopwatch / Counter UI panel -->
            <section class="card card-action">
                <!-- PANEL STOPWATCH (Untuk Lari) -->
                <div id="panel-stopwatch" class="action-panel">
                    <h2 class="card-title text-center">Stopwatch Lari</h2>
                    <div class="display-container">
                        <div class="digital-timer" id="stopwatch-display">00:00.00</div>
                    </div>
                    <div class="button-group-center">
                        <button class="btn btn-success" id="btn-sw-start">Mulai</button>
                        <button class="btn btn-warning" id="btn-sw-pause" disabled>Jeda</button>
                        <button class="btn btn-danger" id="btn-sw-reset">Reset</button>
                    </div>
                    <button class="btn btn-accent btn-block mt-6" id="btn-sw-record">
                        Gunakan Hasil Waktu Ini
                    </button>
                </div>

                <!-- PANEL COUNTER (Untuk Sit up / Push up) -->
                <div id="panel-counter" class="action-panel hidden">
                    <h2 class="card-title text-center" id="counter-title">Counter Repetisi</h2>
                    <div class="display-container">
                        <div class="digital-counter" id="counter-display">0</div>
                    </div>
                    <div class="counter-tactile-grid">
                        <button class="btn-tactile btn-tactile-minus" id="btn-cnt-minus">-1</button>
                        <button class="btn-tactile btn-tactile-plus" id="btn-cnt-plus">+1</button>
                    </div>
                    <div class="button-group-center mt-4">
                        <button class="btn btn-danger" id="btn-cnt-reset">Reset Angka</button>
                    </div>
                    <button class="btn btn-accent btn-block mt-6" id="btn-cnt-record">
                        Gunakan Jumlah Ini
                    </button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Pertasis Digital. SMKC 2 Banjarnegara.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
