
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertasis - Corduba</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Pertasis</h2>
        
        <!-- Form Pengaturan Aktivitas -->
        <div class="form-group-inline">
            <div class="form-group">
                <label>Pilih Kelas</label>
                <select id="selectKelas" required>
                    <option value="">-- Memuat Data Kelas... --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mode Pencatatan</label>
                <select id="modePencatatan" required>
                    <option value="waktu">Waktu (Lari) - Stopwatch</option>
                    <option value="repetisi">Repetisi (Push/Sit-up) - Input Manual</option>
                </select>
            </div>
        </div>
        
        <div class="form-group-inline">
            <div class="form-group">
                <label>Jenis Aktivitas</label>
                <input type="text" id="jenisAktivitas" placeholder="Contoh: Sit Up / Lari 100m" required>
            </div>
            <div class="form-group">
                <label>Minggu Ke-</label>
                <input type="number" id="mingguKe" required>
            </div>
            <div class="form-group">
                <label>Semester</label>
                <select id="semester" required>
                    <option value="1">Ganjil</option>
                    <option value="2">Genap</option>
                </select>
            </div>
        </div>

        <!-- Bagian Stopwatch Global -->
        <div id="stopwatchContainer" class="stopwatch-container">
            <div id="stopwatchDisplay" class="time-display">00:00:00</div>
            <div class="stopwatch-controls">
                <button id="btnStart" class="btn-start">Mulai</button>
                <button id="btnStop" class="btn-stop">Stop</button>
                <button id="btnReset" class="btn-reset">Reset</button>
            </div>
        </div>

        <!-- Daftar Siswa untuk Pencatatan Kolektif -->
        <div id="pencatatanContainer" style="display: none;">
            <h3 style="margin-top: 20px; border-bottom: 2px solid #3498db; padding-bottom: 5px;">Daftar Siswa</h3>
            <ul id="listSiswaPencatatan" class="student-list">
                <!-- Daftar anak akan dimunculkan oleh JavaScript di sini -->
            </ul>
            
            <button id="btnKirimKolektif" class="btn-kirim-kolektif">Kirim Semua Catatan</button>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
